name: Build & Release on Version Bump

on:
  push:
    branches:
      - master
    paths:
      - "pyproject.toml"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          NEW_VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version *= *"\(.*\)"/\1/')
          OLD_VERSION=$(git show HEAD~1:pyproject.toml 2>/dev/null \
            | grep -m1 '^version' \
            | sed 's/version *= *"\(.*\)"/\1/' \
            || echo "")

          echo "Old version: $OLD_VERSION"
          echo "New version: $NEW_VERSION"

          if [ "$NEW_VERSION" != "$OLD_VERSION" ] && [ -n "$NEW_VERSION" ]; then
            echo "version_changed=true"  >> "$GITHUB_OUTPUT"
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Build Linux binary
        env:
          VERSION: ${{ needs.check-version.outputs.new_version }}
        run: |
          ARCH=$(uname -m)
          uv run --no-dev --with pyinstaller pyinstaller \
            --onefile \
            --strip \
            --name "nxm-switch-${VERSION}-linux-${ARCH}" \
            --collect-all nxm_switch \
            --exclude-module tkinter \
            --exclude-module unittest \
            --exclude-module doctest \
            --exclude-module pydoc \
            --exclude-module curses \
            --exclude-module email \
            --exclude-module html \
            --exclude-module http \
            --exclude-module xml \
            --exclude-module xmlrpc \
            --exclude-module sqlite3 \
            --exclude-module asyncio \
            --exclude-module multiprocessing \
            --exclude-module logging \
            --exclude-module ssl \
            --exclude-module ftplib \
            --exclude-module smtplib \
            --exclude-module imaplib \
            --exclude-module csv \
            --exclude-module pickle \
            --exclude-module decimal \
            --exclude-module difflib \
            --exclude-module distutils \
            --exclude-module lib2to3 \
            --exclude-module PySide6.QtWebEngine \
            --exclude-module PySide6.QtWebEngineCore \
            --exclude-module PySide6.QtWebEngineWidgets \
            --exclude-module PySide6.QtWebChannel \
            --exclude-module PySide6.Qt3DCore \
            --exclude-module PySide6.Qt3DRender \
            --exclude-module PySide6.Qt3DInput \
            --exclude-module PySide6.Qt3DLogic \
            --exclude-module PySide6.Qt3DAnimation \
            --exclude-module PySide6.Qt3DExtras \
            --exclude-module PySide6.QtMultimedia \
            --exclude-module PySide6.QtMultimediaWidgets \
            --exclude-module PySide6.QtQml \
            --exclude-module PySide6.QtQuick \
            --exclude-module PySide6.QtQuickWidgets \
            --exclude-module PySide6.QtCharts \
            --exclude-module PySide6.QtDataVisualization \
            --exclude-module PySide6.QtSql \
            --exclude-module PySide6.QtTest \
            --exclude-module PySide6.QtBluetooth \
            --exclude-module PySide6.QtNfc \
            --exclude-module PySide6.QtPositioning \
            --exclude-module PySide6.QtLocation \
            --exclude-module PySide6.QtSensors \
            --exclude-module PySide6.QtSerialPort \
            --exclude-module PySide6.QtSerialBus \
            --exclude-module PySide6.QtScxml \
            --exclude-module PySide6.QtRemoteObjects \
            --exclude-module PySide6.QtTextToSpeech \
            --exclude-module PySide6.QtSpatialAudio \
            --exclude-module PySide6.QtHttpServer \
            --exclude-module PySide6.QtPdf \
            --exclude-module PySide6.QtPdfWidgets \
            --exclude-module PySide6.QtOpenGL \
            --exclude-module PySide6.QtOpenGLWidgets \
            --exclude-module PySide6.QtPrintSupport \
            --exclude-module PySide6.QtSvg \
            --exclude-module PySide6.QtSvgWidgets \
            --exclude-module PySide6.QtNetwork \
            --exclude-module PySide6.QtXml \
            --exclude-module PySide6.QtHelp \
            --exclude-module PySide6.QtUiTools \
            --exclude-module PySide6.QtDesigner \
            --exclude-module PySide6.Qt5Compat \
            nxm_switch/main.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.check-version.outputs.new_version }}"
          name: "v${{ needs.check-version.outputs.new_version }}"
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/nxm-switch-*-linux-*